<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="description" content="">
    <title>Template</title>
    <!-- Bootstrap -->
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <!-- Custom styling -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <h1 class = "dashboard-title">
        Green Grid Simulation 
    <span> Results Dashboard </span> 
    </h1>
    <div class = "dashboard-title-decor"></div>

    <div class="container mt-4">
    <div class="row g-4">

        <div class="col-md-6">
            <div class="card h-100">
                <div class="card-body">
                    <h5 class="card-title">Total production vs Consumption</h5>
                    <div id="chart1"></div>
                </div>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card h-100">
                <div class="card-body">
                    <h5 class="card-title">Donut Chart</h5>
                    <div id="chart2"></div>
                </div>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card h-100">
                <div class="card-body">
                    <h5 class="card-title">Stacked Chart</h5>
                    <div id="chart3"></div>
                </div>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card h-100">
                <div class="card-body">
                    <h5 class="card-title">Line Chart</h5>
                    <div id="chart4"></div>
                </div>
            </div>
        </div>

    </div>
</div>                

<!-- External JS libraries -->
<script src="js/d3.min.js"></script>

<!-- Custom JS -->
<script src="js/main.js"></script>

</body>
</html>
